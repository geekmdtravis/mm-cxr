repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: end-of-file-fixer
      - id: trailing-whitespace
      - id: check-yaml
      - id: check-toml
      - id: check-merge-conflict
      - id: check-added-large-files
        args: ["--maxkb=1024"]

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.4.10
    hooks:
      - id: ruff
        args: ["--fix"]
      - id: ruff-format

  - repo: https://github.com/psf/black
    rev: 24.4.2
    hooks:
      - id: black

# Notes:
# - Ruff replaces flake8 + isort (config in pyproject.toml).
# - Mypy is intentionally out of pre-commit — it is slow and noisy on the
#   tensor-heavy training/model code. CI runs it with a scoped file list
#   (see [tool.mypy] in pyproject.toml).
